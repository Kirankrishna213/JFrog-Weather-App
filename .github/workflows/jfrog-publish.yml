name: Publish to JFrog Artifactory

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://trialcej2k9.jfrog.io
          JF_USER: kiran.krishna@aptean.com
          JF_PASSWORD: JFrog@1234

      - name: Build weather-app artifact (ZIP)
        run: |
          zip -r weather-app.zip . -x ".git/*" ".github/*" "*.zip"

      - name: Upload to Artifactory with build tracking
        run: |
          jf rt u "weather-app.zip" "generic-local/krishna/weather-app/" \
            --build-name=weather-app \
            --build-number=${{ github.run_number }} \
            --properties="commit=${{ github.sha }};branch=${{ github.ref_name }};build-id=${{ github.run_number }}"

      - name: Add Git metadata (commit, branch, remote URL)
        run: |
          jf rt build-add-git weather-app ${{ github.run_number }}

      - name: Add environment variables
        run: |
          jf rt build-add-env weather-app ${{ github.run_number }}

      - name: Publish build info to Artifactory
        run: |
          jf rt build-publish weather-app ${{ github.run_number }}

      - name: Scan with Xray (optional)
        run: |
          jf rt build-scan weather-app ${{ github.run_number }} || true
