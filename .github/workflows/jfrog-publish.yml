name: Publish to JFrog Artifactory

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build weather-app artifact (ZIP)
        run: |
          zip -r weather-app.zip . -x ".git/*" ".github/*" "*.zip"

      - name: Upload to Artifactory (krishna folder) using curl
        run: |
          curl -u kiran.krishna@aptean.com:JFrog@1234 -T weather-app.zip "https://trialcej2k9.jfrog.io/artifactory/generic-local/krishna/weather-app/weather-app.zip"
